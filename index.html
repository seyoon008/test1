<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 자리 번호 뽑기 | Random Seat Picker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-texture"></div>
  
  <main class="app-container">
    <header>
      <h1>🪑 랜덤 자리 번호 뽑기</h1>
      <p>공정하고 즐거운 자리 배치를 시작해보세요!</p>
    </header>

    <section class="control-panel glass">
      <div class="input-row">
        <div class="input-group">
          <label for="max-seats">총 좌석 수</label>
          <input type="number" id="max-seats" min="1" max="1000" value="40">
        </div>
        <div class="input-group">
          <label for="group-count">묶음(그룹) 수</label>
          <input type="number" id="group-count" min="1" max="100" value="1">
        </div>
      </div>
      <div class="button-group">
        <button id="btn-pick" class="btn-primary">번호 뽑기</button>
        <button id="btn-reset" class="btn-secondary">초기화</button>
      </div>
    </section>

    <section class="display-area glass">
      <div id="group-display" class="group-badge"></div>
      <div class="counter-display">
        <span id="current-number">?</span>
      </div>
      <div id="status-message" class="status-message">총 좌석 수와 그룹 수를 설정하고 뽑기를 눌러주세요.</div>
    </section>

    <section class="history-panel glass">
      <h2>최근 뽑힌 번호</h2>
      <div id="history-list" class="history-list">
        <!-- 뽑힌 번호들이 여기에 추가됩니다 -->
        <p class="empty-msg">아직 뽑힌 번호가 없습니다.</p>
      </div>
    </section>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
